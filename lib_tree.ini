├── tests/
│   ├── conftest.py       # shared fixtures (load test .dll/.so)
│   ├── test_registry.py  # register, lookup, evict
│   ├── test_fast_call.py # call correctness, arg types
│   ├── test_batch.py     # 1,000+ call batch correctness
│   ├── test_zero_copy.py # NumPy pointer sharing
│   └── fixtures/         # tiny C kernels compiled for test use
├── bench/
│   ├── bench_vs_ctypes.py
│   ├── bench_vs_nanobind.py
│   └── bench_batch.py
├── .github/workflows/
