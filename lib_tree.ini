nano-ffi/
├── build.zig                  # Replaces all CMake/Make — compiles .so/.pyd
├── build.zig.zon              # Zig package manifest (deps, version)
├── pyproject.toml             # pip packaging via scikit-build-core
│
├── src/
│   ├── root.zig               # Library entry point, exposes the module
│   ├── registry.zig           # AutoHashMap-based function pointer registry
│   ├── comptime_bridge.zig    # Comptime trampoline generator (core magic)
│   ├── allocator.zig          # Explicit allocator wrappers for Python-Zig memory
│   └── python_ext.zig         # PyModuleDef + PyMethodDef bindings via cImport
│
├── tests/
│   ├── test_registry.zig      # Unit tests for registry
│   ├── test_bridge.zig        # Unit tests for comptime trampolines
│   └── test_python.py         # End-to-end Python call benchmark
│
└── README.md