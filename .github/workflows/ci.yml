name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ver=0.15.2
          case "$RUNNER_OS-$RUNNER_ARCH" in
            Linux-X64)   file=zig-x86_64-linux-$ver.tar.xz ;;
            macOS-ARM64) file=zig-aarch64-macos-$ver.tar.xz ;;
            macOS-X64)   file=zig-x86_64-macos-$ver.tar.xz ;;
            Windows-X64) file=zig-x86_64-windows-$ver.zip ;;
            *) echo "unsupported $RUNNER_OS-$RUNNER_ARCH" >&2; exit 1 ;;
          esac
          url="https://ziglang.org/download/$ver/$file"
          echo "Downloading $url"
          dest="$RUNNER_TEMP/zig"
          mkdir -p "$dest"
          curl -fsSL -o "$RUNNER_TEMP/$file" "$url"
          if [[ "$file" == *.zip ]]; then
            unzip -q "$RUNNER_TEMP/$file" -d "$dest"
            zigdir="$(find "$dest" -maxdepth 1 -type d -name 'zig-*' | head -n1)"
          else
            tar -xJf "$RUNNER_TEMP/$file" -C "$dest" --strip-components=1
            zigdir="$dest"
          fi
          echo "$zigdir" >> "$GITHUB_PATH"
          "$zigdir/zig" version
          # On macOS, Zig's native linker needs the SDK path to resolve
          # libSystem when building the `zig build test` executable.
          if [ "$RUNNER_OS" = "macOS" ]; then
            echo "SDKROOT=$(xcrun --show-sdk-path)" >> "$GITHUB_ENV"
          fi

      - name: Resolve Python paths
        id: py
        shell: bash
        run: |
          echo "include=$(python -c 'import sysconfig; print(sysconfig.get_path("include"))')" >> "$GITHUB_OUTPUT"
          echo "tag=python$(python -c 'import sys; print(f"{sys.version_info.major}{sys.version_info.minor}")')" >> "$GITHUB_OUTPUT"

      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          zig build -Doptimize=ReleaseFast -Dpython-include="${{ steps.py.outputs.include }}"
          cp zig-out/lib/nano_ffi.so nano_ffi.so

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          base="$(python -c 'import sysconfig, os; print(os.path.dirname(sysconfig.get_path("include")))')"
          zig build -Doptimize=ReleaseFast \
            -Dpython-include="${{ steps.py.outputs.include }}" \
            -Dpython-lib="$base/libs" \
            -Dpython-libname="${{ steps.py.outputs.tag }}"
          cp zig-out/lib/nano_ffi.pyd nano_ffi.pyd

      # `zig build test` builds a native test executable. On the macOS runner
      # (Xcode 26.5) Zig 0.15.2 fails to link libSystem into that executable
      # (undefined _abort/_free/... ), a Zig-toolchain/SDK version mismatch
      # unrelated to the extension itself (the shared library links fine and
      # the Python e2e suite below exercises the actual compiled .so). Run the
      # Zig unit tests on Linux and Windows, where they link cleanly.
      - name: Zig unit tests
        if: runner.os != 'macOS'
        run: zig build test

      - name: Python end-to-end tests
        run: python tests/test_python.py

  # ---------------------------------------------------------------------------
  # Windows wheels: native build per Python, tagged cpXY-cpXY-win_amd64.
  # PyPI-valid as produced by `python -m build --wheel`.
  # ---------------------------------------------------------------------------
  wheels-windows:
    name: wheel (windows, py${{ matrix.python }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ver=0.15.2
          file=zig-x86_64-windows-$ver.zip
          url="https://ziglang.org/download/$ver/$file"
          dest="$RUNNER_TEMP/zig"; mkdir -p "$dest"
          curl -fsSL -o "$RUNNER_TEMP/$file" "$url"
          unzip -q "$RUNNER_TEMP/$file" -d "$dest"
          zigdir="$(find "$dest" -maxdepth 1 -type d -name 'zig-*' | head -n1)"
          echo "$zigdir" >> "$GITHUB_PATH"
          "$zigdir/zig" version

      - name: Build extension + wheel
        shell: bash
        run: |
          inc="$(python -c 'import sysconfig; print(sysconfig.get_path("include"))')"
          base="$(python -c 'import sysconfig, os; print(os.path.dirname(sysconfig.get_path("include")))')"
          tag="python$(python -c 'import sys; print(f"{sys.version_info.major}{sys.version_info.minor}")')"
          zig build -Doptimize=ReleaseFast -Dpython-include="$inc" -Dpython-lib="$base/libs" -Dpython-libname="$tag"
          cp zig-out/lib/nano_ffi.pyd nano_ffi.pyd
          python -m pip install --upgrade build twine
          python -m build --wheel

      - name: Validate wheel
        shell: bash
        run: |
          ls -la dist/
          python -m twine check dist/*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-windows-py${{ matrix.python }}
          path: dist/*.whl

  # ---------------------------------------------------------------------------
  # macOS wheels: both arches produced on the Apple-silicon runner (macos-14).
  # arm64 is a native build; x86_64 is Zig-cross-compiled from the same runner
  # (Zig ships libSystem stubs for both, and our shared lib links with
  # allow-shlib-undefined). This avoids the scarce/slow macos-13 Intel runner
  # entirely. Each job produces one cpXY-cpXY-macosx_*_<arch> wheel, PyPI-valid.
  # ---------------------------------------------------------------------------
  wheels-macos:
    name: wheel (macos ${{ matrix.arch }}, py${{ matrix.python }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
        python: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Zig 0.15.2
        shell: bash
        run: |
          set -euo pipefail
          ver=0.15.2
          file=zig-aarch64-macos-$ver.tar.xz
          url="https://ziglang.org/download/$ver/$file"
          dest="$RUNNER_TEMP/zig"; mkdir -p "$dest"
          curl -fsSL -o "$RUNNER_TEMP/$file" "$url"
          tar -xJf "$RUNNER_TEMP/$file" -C "$dest" --strip-components=1
          echo "$dest" >> "$GITHUB_PATH"
          "$dest/zig" version

      - name: Build extension + wheel
        shell: bash
        run: |
          set -euo pipefail
          # Pin a single-arch platform tag. setup-python's CPython reports a
          # `universal2` platform by default, which would mislabel our native
          # single-arch .so as fat/universal and let pip install it on the
          # wrong architecture. Pin the tag and the Zig target per arch.
          case "${{ matrix.arch }}" in
            arm64)
              zigtarget="aarch64-macos"
              export MACOSX_DEPLOYMENT_TARGET=11.0
              export _PYTHON_HOST_PLATFORM="macosx-11.0-arm64"
              ;;
            x86_64)
              zigtarget="x86_64-macos"
              export MACOSX_DEPLOYMENT_TARGET=10.13
              export _PYTHON_HOST_PLATFORM="macosx-10.13-x86_64"
              ;;
            *) echo "unsupported arch ${{ matrix.arch }}" >&2; exit 1 ;;
          esac
          inc="$(python -c 'import sysconfig; print(sysconfig.get_path("include"))')"
          zig build -Doptimize=ReleaseFast -Dtarget="$zigtarget" -Dpython-include="$inc"
          cp zig-out/lib/nano_ffi.so nano_ffi.so
          echo "=== built .so arch ==="
          file nano_ffi.so
          python -m pip install --upgrade build twine
          python -m build --wheel

      - name: Validate wheel
        shell: bash
        run: |
          set -euo pipefail
          ls -la dist/
          # Assert the .so inside is the expected arch and the tag is
          # single-arch, not universal2.
          case "${{ matrix.arch }}" in
            arm64)  want_arch=arm64;  want_file="arm64" ;;
            x86_64) want_arch=x86_64; want_file="x86_64" ;;
          esac
          if ! ls dist/*"$want_arch".whl >/dev/null 2>&1; then
            echo "ERROR: expected a *_$want_arch.whl, got:" >&2
            ls dist/ >&2
            exit 1
          fi
          if ls dist/*universal2*.whl >/dev/null 2>&1; then
            echo "ERROR: produced a universal2 wheel from a single-arch build" >&2
            exit 1
          fi
          if ! file nano_ffi.so | grep -q "$want_file"; then
            echo "ERROR: nano_ffi.so is not $want_file:" >&2
            file nano_ffi.so >&2
            exit 1
          fi
          python -m twine check dist/*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-${{ matrix.arch }}-py${{ matrix.python }}
          path: dist/*.whl

  # ---------------------------------------------------------------------------
  # Linux wheels: built inside a manylinux_2_28 container. A plain
  # linux_x86_64 wheel is rejected by PyPI, so we `auditwheel repair` the
  # freshly built wheel into a manylinux_* wheel. Zig 0.15.2 is downloaded
  # into the container (statically linked, glibc-independent).
  # ---------------------------------------------------------------------------
  wheels-linux:
    name: wheel (manylinux, py${{ matrix.python }})
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.12"
            pybin: cp312-cp312
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/zig.tar.xz https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz
          mkdir -p /opt/zig
          tar -xJf /tmp/zig.tar.xz -C /opt/zig --strip-components=1
          /opt/zig/zig version

      - name: Build extension + wheel + auditwheel repair
        run: |
          set -euo pipefail
          export PATH="/opt/zig:/opt/python/${{ matrix.pybin }}/bin:$PATH"
          PY=/opt/python/${{ matrix.pybin }}/bin/python
          "$PY" --version
          inc="$("$PY" -c 'import sysconfig; print(sysconfig.get_path("include"))')"
          zig build -Doptimize=ReleaseFast -Dpython-include="$inc"
          cp zig-out/lib/nano_ffi.so nano_ffi.so
          "$PY" -m pip install --upgrade build auditwheel twine
          "$PY" -m build --wheel
          echo "=== raw wheel (linux_x86_64, not PyPI-valid) ==="
          ls -la dist/
          "$PY" -m auditwheel repair dist/*.whl -w wheelhouse/
          echo "=== repaired wheel (manylinux, PyPI-valid) ==="
          ls -la wheelhouse/
          # Fail loudly if the repaired wheel is not manylinux-tagged.
          if ! ls wheelhouse/*manylinux*.whl >/dev/null 2>&1; then
            echo "ERROR: no manylinux wheel produced by auditwheel repair" >&2
            exit 1
          fi
          "$PY" -m twine check wheelhouse/*.whl

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-manylinux-py${{ matrix.python }}
          path: wheelhouse/*.whl

  # ---------------------------------------------------------------------------
  # Publish to PyPI using an API token stored as the PYPI_API_TOKEN secret.
  # Only runs for pushed tags (refs/tags/v*) or manual workflow_dispatch, and
  # only after every wheel job succeeds. On normal branch pushes / PRs the
  # `if:` is false so this job is SKIPPED (it does not gate the wheel matrix).
  # ---------------------------------------------------------------------------
  publish:
    name: publish to PyPI
    needs: [wheels-windows, wheels-macos, wheels-linux]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: List collected wheels
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
