name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            lib-ext: so

          - os: macos-latest
            lib-ext: so

          - os: windows-latest
            lib-ext: pyd

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zig 0.13.0
        uses: mlugg/setup-zig@v1
        with:
          version: "0.13.0"

      - name: Get Python paths (Unix)
        if: runner.os != 'Windows'
        run: |
          python3 -c "import sysconfig; print('PY_INCLUDE=' + sysconfig.get_path('include'))" >> $GITHUB_ENV
          python3 -c "import sysconfig; v=sysconfig.get_config_var('LIBDIR'); print('PY_LIB=' + (v or ''))" >> $GITHUB_ENV

      - name: Get Python paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $inc = python -c "import sysconfig; print(sysconfig.get_path('include'))"
          $lib = python -c "import sysconfig; print(sysconfig.get_config_var('BINDIR'))"
          echo "PY_INCLUDE=$inc" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "PY_LIB=$lib" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          zig build \
            -Doptimize=ReleaseFast \
            "-Dpython-include=$PY_INCLUDE" \
            "-Dpython-lib=$PY_LIB"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          zig build `
            -Doptimize=ReleaseFast `
            "-Dpython-include=$env:PY_INCLUDE" `
            "-Dpython-lib=$env:PY_LIB" `
            "-Dpython-libname=python312"

      - name: Copy extension to root
        shell: bash
        run: cp zig-out/lib/nano_ffi.* .

      - name: Install build
        run: pip install build

      - name: Build wheel
        run: python -m build --wheel --no-isolation

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
